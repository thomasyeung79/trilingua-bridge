<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e3a8a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#0f766e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="url(#bg)"/>
  <!-- Globe / Bridge arc -->
  <path d="M 96 320 Q 256 120 416 320" fill="none" stroke="url(#accent)" stroke-width="12" stroke-linecap="round"/>
  <path d="M 96 330 Q 256 530 416 330" fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  <!-- TL initials -->
  <text x="256" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="180" font-weight="900" text-anchor="middle" fill="#ffffff">TL</text>
  <!-- Language dots -->
  <circle cx="160" cy="380" r="10" fill="#2563eb"/>
  <circle cx="220" cy="380" r="10" fill="#0f766e"/>
  <circle cx="280" cy="380" r="10" fill="#b45309"/>
  <circle cx="340" cy="380" r="10" fill="#2563eb" opacity="0.7"/>
  <circle cx="370" cy="350" r="8" fill="#0f766e" opacity="0.7"/>
</svg>
